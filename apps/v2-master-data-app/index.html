<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simulasi SIMRS</title>
  <!-- 🌍 Runtime Configuration -->
  <script src="/config.js"></script>
</head>

<body>
  <!-- 🌊 Premium Pre-load Splash -->
  <div id="global-loader"
    style="position: fixed; inset: 0; background: #fafaf9; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; font-family: system-ui, -apple-system, sans-serif; transition: opacity 0.5s ease-out, visibility 0.5s;">
    <div style="position: relative; width: 64px; height: 64px;">
      <div style="position: absolute; inset: 0; border: 4px solid rgba(13, 148, 136, 0.1); border-radius: 50%;"></div>
      <div
        style="position: absolute; inset: 0; border: 4px solid #0d9488; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite;">
      </div>
    </div>
    <h2 id="loader-title"
      style="margin-top: 24px; font-size: 1.25rem; font-weight: 800; color: #0f766e; letter-spacing: -0.025em; animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; margin-bottom: 0;">
      NEUROVI SIMRS
    </h2>
    <p id="loader-text"
      style="margin-top: 8px; color: #78716c; font-size: 0.875rem; font-weight: 500; margin-bottom: 0;">
      Menghubungkan sesi aman Bosku...
    </p>
    <style>
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes pulse {

        0%,
        100% {
          opacity: 1;
        }

        50% {
          opacity: .5;
        }
      }
    </style>
  </div>

  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
